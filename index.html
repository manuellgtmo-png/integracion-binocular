<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Integración Binocular PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --primary: #f8fafc; --pink: #ff2e63; 
            --blue: #38bdf8; --card: #1e293b; --success: #10b981; --yellow: #facc15;
            --rojo-bg: #80322a; --rojo-fig: #69302a;
            --verde-bg: #69913d; --verde-fig: #6c7b5a;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Montserrat'; background: var(--bg); color: var(--primary); 
            overflow: hidden; display: flex; flex-direction: column;
            touch-action: none; user-select: none;
        }

        body.error-flash { background: #450a0a !important; transition: 0.1s; }

        /* HEADER MÁS GRANDE */
        .header { 
            height: 110px; min-height: 110px; background: #1e293b; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 30px; border-bottom: 5px solid var(--success); z-index: 100;
        }

        .btn-salir-juego {
            background: rgba(255, 255, 255, 0.1);
            color: white; border: 2px solid rgba(255,255,255,0.3); 
            padding: 12px 20px; border-radius: 15px; font-weight: 900; 
            font-size: 0.8rem; cursor: pointer;
        }

        .stats-group { display: flex; gap: 40px; }
        .stat { text-align: center; }
        .stat b { display: block; color: var(--blue); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 5px; }
        .stat span { font-size: 2.2rem; font-weight: 900; }

        #txt-vidas { display: flex; gap: 8px; font-size: 2rem; }
        .corazon { transition: 0.3s; filter: drop-shadow(0 0 5px rgba(255, 46, 99, 0.4)); }

        #instruccion-fija { 
            background: #1e293b; padding: 15px; text-align: center; 
            font-weight: 900; font-size: 1.4rem; color: var(--yellow); 
            border-bottom: 3px solid #334155; z-index: 90;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }

        #game-area { flex-grow: 1; position: relative; overflow: hidden; background: #0f172a; }
        
        .obj { 
            position: absolute; border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; cursor: pointer;
        }
        .rojo { background: var(--rojo-bg); color: var(--rojo-fig); }
        .verde { background: var(--verde-bg); color: var(--verde-fig); }

        /* INTRODUCCIÓN */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border-radius: 40px; padding: 40px; width: 95%; max-width: 500px; 
            text-align: center; border: 3px solid var(--blue);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .intro-icon { font-size: 5rem; margin-bottom: 10px; display: block; }
        
        .btn-principal { 
            background: var(--success); color: white; padding: 22px; 
            border-radius: 25px; font-weight: 900; border: none; 
            cursor: pointer; width: 100%; font-size: 1.4rem; 
            text-transform: uppercase; box-shadow: 0 8px 0 #065f46; 
            margin-bottom: 20px;
        }
        .btn-principal:active { transform: translateY(4px); box-shadow: 0 4px 0 #065f46; }

        .btn-portal {
            display: block; color: #94a3b8; font-size: 1rem;
            text-decoration: none; font-weight: 700; padding: 15px;
            border: 2px solid rgba(148, 163, 184, 0.3); border-radius: 20px;
            transition: 0.3s;
        }
        .btn-portal:hover { color: white; border-color: white; background: rgba(255,255,255,0.05); }
        
        input { 
            width: 100%; padding: 20px; border-radius: 20px; 
            border: 3px solid #334155; background: #0f172a; 
            color: white; margin-bottom: 25px; text-align: center; 
            font-family: 'Montserrat'; font-size: 1.3rem;
        }

        #btn-next { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            width: auto; min-width: 280px; background: var(--pink); box-shadow: 0 8px 0 #9f1239; 
            display: none; z-index: 3000; 
        }
    </style>
</head>
<body onclick="registrarFallo(event)">

<div id="screen-start" class="overlay">
    <div class="card">
        <span class="intro-icon">🚀</span>
        <h1 style="color:var(--primary); margin:0; font-size: 2.5rem;">¡HOLA!</h1>
        <p style="color: var(--blue); font-weight: 900; margin-bottom: 25px;">¿LISTO PARA ENTRENAR?</p>
        <input type="text" id="paciente-nombre" placeholder="TU NOMBRE AQUÍ">
        <button class="btn-principal" onclick="irAInstrucciones()">¡A JUGAR! ✨</button>
        
        <a href="https://manuellgtmo-png.github.io/Portal-de-juegos-de-terapia-visual/" class="btn-portal">🏠 VOLVER AL PORTAL</a>
    </div>
</div>

<div id="screen-how" class="overlay" style="display:none">
    <div class="card">
        <h2 style="color:var(--yellow); font-size: 2rem;">¿QUÉ HACER?</h2>
        <div style="text-align: left; color: #cbd5e1; font-size: 1.2rem; margin: 30px 0; background: rgba(0,0,0,0.3); padding: 25px; border-radius: 25px;">
            <p>🕶️ Usa tus <b>gafas ROJO/VERDE</b></p>
            <p>🎯 Atrapa solo la figura indicada</p>
            <p>🌌 ¡No toques el fondo!</p>
        </div>
        <button class="btn-principal" onclick="iniciarJuegoReal()" style="background: var(--blue); box-shadow: 0 8px 0 #0369a1;">¡ENTENDIDO! 🚀</button>
    </div>
</div>

<div class="header">
    <button onclick="location.reload()" class="btn-salir-juego">⬅ SALIR AL INICIO</button>
    <div class="stats-group">
        <div class="stat"><b>Nivel</b><span id="txt-nivel">1</span></div>
        <div class="stat"><b>Vidas</b><div id="txt-vidas"></div></div>
        <div class="stat"><b>Tiempo</b><span id="txt-cron">00:00</span></div>
    </div>
</div>

<div id="instruccion-fija">BUSCA ESTO: <span id="figura-objetivo" style="font-size: 2rem; color: white;"></span></div>
<div id="game-area"></div>
<button id="btn-next" class="btn-principal" onclick="siguienteNivelAccion()">¡NIVEL COMPLETADO! ➜</button>

<iframe name="target_frame" style="display:none;"></iframe>

<script>
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function sonar(f, d, t='sine') {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    let nivel = 1, aciertos = 0, fallos = 0, vidas = 3, segs = 0;
    let crono, gameActive = false, objetivoActual = "";
    let animIds = [];
    let nombreFinal = localStorage.getItem('pacienteActual') || "";

    const items = { "Cuadrado": "■", "Triángulo": "▲", "Corazón": "❤", "Estrella": "★", "Letra O": "O", "Letra U": "U" };

    function actualizarCorazones() {
        const div = document.getElementById('txt-vidas');
        div.innerHTML = "";
        for(let i=0; i<3; i++) {
            const s = document.createElement('span');
            s.className = 'corazon';
            s.innerText = i < vidas ? "❤️" : "🖤";
            div.appendChild(s);
        }
    }

    function irAInstrucciones() {
        initAudio();
        let nom = document.getElementById('paciente-nombre').value;
        if(!nom) return alert("¡Escribe tu nombre!");
        nombreFinal = nom;
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-how').style.display = 'flex';
    }

    function iniciarJuegoReal() {
        document.getElementById('screen-how').style.display = 'none';
        gameActive = true;
        actualizarCorazones();
        crono = setInterval(() => { 
            segs++; 
            document.getElementById('txt-cron').innerText = new Date(segs * 1000).toISOString().substr(14, 5); 
        }, 1000);
        generarEscena();
    }

    function generarEscena() {
        const area = document.getElementById('game-area');
        area.innerHTML = "";
        animIds.forEach(id => cancelAnimationFrame(id));
        animIds = [];
        document.getElementById('btn-next').style.display = "none";
        
        const keys = Object.keys(items);
        objetivoActual = items[keys[Math.floor(Math.random() * keys.length)]];
        document.getElementById('figura-objetivo').innerText = objetivoActual;

        let total = 8 + (nivel * 2);
        for(let i=0; i<total; i++) {
            const obj = document.createElement('div');
            const esRojo = Math.random() > 0.5;
            let simb = (i === 0) ? objetivoActual : items[keys[Math.floor(Math.random() * keys.length)]];
            const size = Math.max(45, 80 - (nivel * 2));
            
            obj.className = `obj ${esRojo ? 'rojo' : 'verde'}`;
            obj.innerText = simb;
            obj.style.width = size + "px";
            obj.style.height = size + "px";
            obj.style.fontSize = (size * 0.7) + "px";
            
            let px = Math.random() * (area.clientWidth - size);
            let py = Math.random() * (area.clientHeight - size);
            let vx = (Math.random() - 0.5) * (3 + nivel * 0.5);
            let vy = (Math.random() - 0.5) * (3 + nivel * 0.5);

            function mover() {
                if(!gameActive || obj.style.opacity === "0") return;
                px += vx; py += vy;
                if(px <= 0 || px >= area.clientWidth - size) vx *= -1;
                if(py <= 0 || py >= area.clientHeight - size) vy *= -1;
                obj.style.left = px + "px"; obj.style.top = py + "px";
                animIds.push(requestAnimationFrame(mover));
            }
            mover();

            if(simb === objetivoActual) obj.dataset.target = "true";
            obj.onclick = (e) => {
                e.stopPropagation();
                if(obj.dataset.target === "true") {
                    sonar(800, 0.1); obj.style.opacity = "0"; obj.style.pointerEvents = "none";
                    aciertos++; revisarFin();
                } else { registrarFalloManual(); }
            };
            area.appendChild(obj);
        }
    }

    function registrarFalloManual() {
        if(!gameActive) return;
        sonar(150, 0.3, 'sawtooth');
        vidas--; fallos++;
        actualizarCorazones();
        document.body.classList.add('error-flash');
        setTimeout(() => document.body.classList.remove('error-flash'), 100);
        if(vidas <= 0) location.reload();
    }

    function registrarFallo(e) {
        if(gameActive && e.target.id === "game-area") registrarFalloManual();
    }

    function revisarFin() {
        const rest = Array.from(document.querySelectorAll('.obj[data-target="true"]')).filter(r => r.style.opacity !== "0");
        if(rest.length === 0) {
            document.getElementById('btn-next').style.display = "block";
            sonar(1100, 0.2);
        }
    }

    function siguienteNivelAccion() {
        nivel++;
        document.getElementById('txt-nivel').innerText = nivel;
        generarEscena();
    }
</script>
</body>
</html>
